# phi-auto: Ultra-small config for quick testing
# ~100K params, trains in < 5 min

[model]
vocab_size = 512
n_embd = 64
n_head = 4
n_layer = 2
seq_len = 64

[training]
batch_size = 8
grad_accum = 1
lr = 5e-4
min_lr = 5e-5
warmup_steps = 20
max_steps = 500
eval_interval = 100
eval_steps = 5
log_interval = 10
weight_decay = 0.1
grad_clip = 1.0
time_budget = 300
