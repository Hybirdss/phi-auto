# phi-auto default configuration
# Optimized for phone: Snapdragon ARM, 10GB RAM

[model]
vocab_size = 1024         # small BPE vocabulary
n_embd = 192              # embedding dimension
n_head = 6                # attention heads
n_layer = 6               # transformer blocks
seq_len = 256             # context window
dropout = 0.0             # no dropout for small models

[training]
batch_size = 8            # micro batch
grad_accum = 4            # effective batch = 32
learning_rate = 3e-4      # peak LR
min_lr = 3e-5             # minimum LR (10% of peak)
warmup_steps = 100        # LR warmup
max_steps = 5000          # training steps
eval_interval = 250       # eval every N steps
eval_steps = 20           # number of eval batches
log_interval = 10         # print every N steps
weight_decay = 0.1        # AdamW weight decay
beta1 = 0.9
beta2 = 0.95
grad_clip = 1.0           # gradient clipping
time_budget = 1800        # 30 min per experiment (seconds)

[data]
dataset = "tinystories"   # dataset name
data_dir = "~/.cache/phi-auto/data"
tokenizer_path = "~/.cache/phi-auto/tokenizer.json"
val_ratio = 0.05          # 5% validation

[experiment]
results_file = "results.tsv"
checkpoint_dir = "checkpoints"
log_dir = "logs"
